<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="img/">

    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="css/style.css">
    
    <title>Tarefas do dia JS </title>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-4">
                <img src="img/to-do-list-tarefas.png" alt="Tarefas" class="img-fluid">
            </div>
            <div class="col-sm-8" id="divQuadro">
                <h1>
                    Tarefas do dia (a realizar)</h1>
                <form>
                    <p><label for="inTarefa">Tarefa</label>
                    <input type="text" class="form-control" id="inTarefa" required autofocus>
                    </p>
                    <p><input type="submit" class="btn btn-primary" value="Adicionar &#10003";>
                    <input type="button" class="btn btn-info"
                            value="Selecionar &#8645;" id="btSelecionar">
                    <input type="button" class="btn btn-danger" value="Retirar Selecionada &#10007;" id="btRetirar">
                    <input type="button" class="btn btn-success"
                            value="Gravar &#9673;" id="btGravar">
                    </p>
                </form>
            </div>
        </div> 
    </div> 
    <script src="js/ex10_1.js"></script>
</body>
</html>
