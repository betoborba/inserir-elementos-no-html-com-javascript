<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="img/">

    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="css/style.css">

    <title>Contando Dinheiros</title>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-5">
                <img src="img/" alt="Moedas" class="img-fluid">
            </div>
            <div class="col-sm-7" id="divMoedas">
                <form>
                    <h1>Vamos Brincar de Dinheiros?</h1>
                    <p><label for="inSoma"> A soma das moedas exibidas abaixo é:</label>
                    <input type="number" min="0" step="0.05" class="form-control" id="inSoma" required autofocus>
                    </p>
                    <p><input type="submit" class="btn btn-primary" value="Conferir Resposta">
                    <input type="reset" class="btn btn-danger" value="Exibir Novas Moedas">
                    </p>
                </form>
            </div>
        </div>
    </div>
    <script src="js/ex10_2.js"></script>
</body>
</html>
